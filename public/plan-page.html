<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="robots" content="noindex, nofollow"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IPTV Paket – IPTVV.DE</title>
<meta name="description" content="IPTV Paket Details – Deutschlands führender IPTV Anbieter."/>
<!-- fonts served via system stack -->
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#ff5266;--gfrom:#ffce00;--gto:#d00000}
html{scroll-behavior:smooth}
body{background:#0f0a1a;color:#fff;font-family:-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif;font-size:16px;line-height:1.6}
a{color:#fff;text-decoration:none}
.container{max-width:1200px;margin:0 auto;padding:0 20px}
.btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--gfrom),var(--gto));color:#1a1a1a;font-family:-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif;font-weight:700;padding:0 34px;line-height:50px;border-radius:50px;border:none;cursor:pointer;font-size:15px;transition:all .3s;text-decoration:none}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,206,0,.3)}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(20,4,56,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,206,0,.15)}
.ni{max-width:1200px;margin:0 auto;padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:74px}
.logo-a{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-svg{width:36px;height:36px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.logo-txt{font-family:-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif;font-weight:900;font-size:1.1rem}
.logo-txt .w{color:#fff}
.logo-txt .o{background:linear-gradient(135deg,#ffce00,#d00000);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nmenu{display:flex;gap:26px;list-style:none}
.nmenu a{color:rgba(255,255,255,.7);font-size:14px;font-weight:600;transition:color .2s}
.nmenu a:hover{color:#ffce00}
.ncta{background:linear-gradient(135deg,#ffce00,#d00000);color:#1a1a1a;font-family:-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif;font-weight:700;padding:0 22px;line-height:40px;border-radius:50px;font-size:12px}

/* MAIN */
main{padding:100px 20px 60px;min-height:100vh}
.plan-hero{text-align:center;margin-bottom:50px}
.plan-hero h1{font-family:-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif;font-size:clamp(28px,5vw,42px);font-weight:900;margin-bottom:16px;background:linear-gradient(135deg,#ffce00,#d00000);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.plan-hero p{color:rgba(255,255,255,.65);font-size:16px;max-width:600px;margin:0 auto}

.plan-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:24px;margin-bottom:40px;padding:32px;background:linear-gradient(135deg,rgba(255,206,0,.05),rgba(208,0,0,.05));border:1px solid rgba(255,206,0,.1);border-radius:20px}
.plan-card{background:linear-gradient(135deg,rgba(255,206,0,.08),rgba(208,0,0,.08));border:1.5px solid;border-image:linear-gradient(135deg,#ffce00,#d00000) 1;border-radius:16px;padding:32px;transition:all .3s}
.plan-card:hover{transform:translateY(-8px);box-shadow:0 16px 40px rgba(255,206,0,.15)}
.plan-duration{font-family:-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif;font-size:12px;font-weight:700;color:rgba(255,206,0,.9);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.plan-price{font-size:clamp(36px,5vw,48px);font-weight:900;background:linear-gradient(135deg,#ffce00,#d00000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.plan-per{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:24px}
.plan-features{list-style:none;margin:24px 0;font-size:14px}
.plan-features li{padding:10px 0;display:flex;gap:8px;color:rgba(255,255,255,.75);border-bottom:1px solid rgba(255,206,0,.1)}
.plan-features li:last-child{border:none}
.plan-features li::before{content:'✓';color:#ffce00;font-weight:700;flex-shrink:0;font-size:18px}
.plan-btn{display:block;width:100%;text-align:center;padding:14px;background:linear-gradient(135deg,#ffce00,#d00000);color:#1a1a1a;font-weight:700;border-radius:8px;text-decoration:none;margin-top:28px;transition:all .2s;font-size:14px;border:none;cursor:pointer}
.plan-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,206,0,.3)}

footer{background:#0a0120;padding:48px 0 24px;border-top:1px solid rgba(255,206,0,.1)}
.footer-content{max-width:1200px;margin:0 auto;padding:0 20px;text-align:center}
.footer-content p{font-size:12px;color:rgba(255,255,255,.45)}

@media(max-width:768px){
  main{padding:80px 16px 40px}
  .plan-grid{grid-template-columns:1fr;padding:20px}
}

/* ════ GERMANY FLAG GRADIENT ON EVERY PRICING CARD ════ */
.pcard.cw,
.pcard.cl2,
.pcard.cm,
.pcard.cd {
  background: linear-gradient(90deg, rgba(255,0,21,0.18) 0%, rgba(49,54,50,0.22) 50%, rgba(255,229,0,0.16) 100%) !important;
  border: 1.5px solid rgba(255,229,0,0.38) !important;
  box-shadow: 0 6px 32px rgba(255,0,21,0.2) !important;
  border-radius: 18px !important;
  overflow: visible !important;
}
.pcard.cw:hover,.pcard.cl2:hover,.pcard.cm:hover,.pcard.cd:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 40px rgba(255,0,21,0.3) !important;
}
/* All card text white — gradient bg is semi-transparent with dark midpoint */
.pcard .pdur { color: #fff !important; }
.pcard .pam  { color: #fff !important; }
.pcard .pcu  { color: rgba(255,255,255,.8) !important; }
.pcard .pper { color: rgba(255,255,255,.52) !important; }
.pcard .pfts li { color: rgba(255,255,255,.88) !important; }
/* Frosted glass button on each card */
.pcard .pbtn {
  background: rgba(255,255,255,0.15) !important;
  color: #fff !important;
  border: 1.5px solid rgba(255,255,255,0.38) !important;
  backdrop-filter: blur(6px);
}
.pcard .pbtn:hover {
  background: rgba(255,255,255,0.25) !important;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3) !important;
}
</style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <div class="ni">
    <a href="index.html" class="logo-a">
      <svg class="logo-svg" viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="15" width="80" height="20" fill="#000"/>
        <rect x="10" y="35" width="80" height="20" fill="#d00000"/>
        <rect x="10" y="55" width="80" height="20" fill="#ffce00"/>
        <circle cx="50" cy="45" r="25" fill="none" stroke="#ffce00" stroke-width="2" opacity="0.6">
          <animate attributeName="r" values="25;35;25" dur="3s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
        </circle>
      </svg>
      <div class="logo-txt"><span class="w">IPTV</span><span class="o">KAUFEN</span></div>
    </a>
    <ul class="nmenu">
      <li><a href="index.html">Heim</a></li>
      <li><a href="preise.html">Preise</a></li>
      <li><a href="faqs.html">FAQs</a></li>
      <li><a href="kontakt.html">Kontaktiere uns</a></li>
    </ul>
    <a href="/whatsapp-kontakt" class="ncta">Kostenloser Test</a>
  </div>
</nav>

<!-- MAIN -->
<main>
  <div class="container">
    <div class="plan-hero">
      <h1 id="planTitle">IPTV Paket laden...</h1>
      <p id="planDesc">Bitte einen Moment Geduld...</p>
    </div>
    <div class="plan-grid" id="planContent"></div>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <div class="footer-content">
    <p>© 2026 IPTVV.DE – Alle Rechte vorbehalten | Nur für legale Inhalte</p>
  </div>
</footer>

<script>
const plans = {
  '1-monat-1-gerat-iptv': {title: '1 Monat – 1 Gerät', duration: '1 Monat', price: '9€', desc: 'Flexibles Abonnement'},
  '3-monate-1-gerat-iptv': {title: '3 Monate – 1 Gerät', duration: '3 Monate', price: '29€', desc: '3-Monats-Plan'},
  '6-monate-1-gerat-iptv': {title: '6 Monate – 1 Gerät', duration: '6 Monate', price: '39€', desc: 'Halbjahresplan'},
  '1-jahr-1-gerat-iptv': {title: '1 Jahr – 1 Gerät', duration: '1 Jahr', price: '49€', desc: 'Ganzes Jahr - Bester Preis'},
  '1-monat-2-gerate-iptv': {title: '1 Monat – 2 Geräte', duration: '1 Monat', price: '18€', desc: 'Flexibel mit 2 Geräten'},
  '3-monate-2-gerate-iptv': {title: '3 Monate – 2 Geräte', duration: '3 Monate', price: '50€', desc: '3 Monate - 2 Geräte'},
  '6-monate-2-gerate-iptv': {title: '6 Monate – 2 Geräte', duration: '6 Monate', price: '69€', desc: 'Halbjahr - 2 Geräte'},
  '1-jahr-2-gerate-iptv': {title: '1 Jahr – 2 Geräte', duration: '1 Jahr', price: '89€', desc: 'Ganzes Jahr - 2 Geräte'},
  '1-monat-3-gerate-iptv': {title: '1 Monat – 3 Geräte', duration: '1 Monat', price: '27€', desc: 'Flexibel mit 3 Geräten'},
  '3-monate-3-gerate-iptv': {title: '3 Monate – 3 Geräte', duration: '3 Monate', price: '75€', desc: '3 Monate - 3 Geräte'},
  '6-monate-3-gerate-iptv': {title: '6 Monate – 3 Geräte', duration: '6 Monate', price: '105€', desc: 'Halbjahr - 3 Geräte'},
  '1-jahr-3-gerate-iptv': {title: '1 Jahr – 3 Geräte', duration: '1 Jahr', price: '135€', desc: 'Ganzes Jahr - 3 Geräte'},
  '1-monat-4-gerate-iptv': {title: '1 Monat – 4 Geräte', duration: '1 Monat', price: '36€', desc: 'Flexibel mit 4 Geräten'},
  '3-monate-4-gerate-iptv': {title: '3 Monate – 4 Geräte', duration: '3 Monate', price: '99€', desc: '3 Monate - 4 Geräte'},
  '6-monate-4-gerate-iptv': {title: '6 Monate – 4 Geräte', duration: '6 Monate', price: '140€', desc: 'Halbjahr - 4 Geräte'},
  '1-jahr-4-gerate-iptv': {title: '1 Jahr – 4 Geräte', duration: '1 Jahr', price: '180€', desc: 'Ganzes Jahr - 4 Geräte'},
  '1-monat-5-gerate-iptv': {title: '1 Monat – 5 Geräte', duration: '1 Monat', price: '45€', desc: 'Flexibel mit 5 Geräten'},
  '3-monate-5-gerate-iptv': {title: '3 Monate – 5 Geräte', duration: '3 Monate', price: '120€', desc: '3 Monate - 5 Geräte'},
  '6-monate-5-gerate-iptv': {title: '6 Monate – 5 Geräte', duration: '6 Monate', price: '175€', desc: 'Halbjahr - 5 Geräte'},
  '1-jahr-5-gerate-iptv': {title: '1 Jahr – 5 Geräte', duration: '1 Jahr', price: '225€', desc: 'Ganzes Jahr - 5 Geräte'}
};

const features = ['25.000+ Live-Kanäle','120.000+ Filme & Serien','4K Ultra HD Qualität','Bundesliga · Sky · DAZN','PPV Events inklusive','EPG & Catch-Up TV','Alle Geräte kompatibel','24/7 Deutscher Support'];

const pathname = window.location.pathname.split('/').pop().replace('.html', '');
const plan = plans[pathname];

if (plan) {
  document.getElementById('planTitle').textContent = plan.title;
  document.getElementById('planDesc').textContent = plan.desc;
  
  const html = `
    <div class="plan-card">
      <div class="plan-duration">${plan.duration}</div>
      <div class="plan-price">${plan.price}</div>
      <p class="plan-per">Paketpreis</p>
      <ul class="plan-features">
        ${features.map(f => `<li>${f}</li>`).join('')}
      </ul>
      <a href="/whatsapp-kontakt?plan=${pathname}" class="plan-btn">Jetzt bestellen →</a>
    </div>
  `;
  document.getElementById('planContent').innerHTML = html;
}
</script>

</body>
</html>
