<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>WhatsApp Kontakt – IPTVV.DE</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet"/>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#ff5266;--gfrom:#ff9a3e;--gto:#ff5266}
html{scroll-behavior:smooth}
body{background:#140438;color:#fff;font-family:'Lato',sans-serif;font-size:16px;line-height:1.6}
.container{max-width:600px;margin:0 auto;padding:20px}

#nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(10,4,30,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06)}
.ni{max-width:1200px;margin:0 auto;padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:74px}
.logo-a{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-txt{font-family:'Inter Tight',sans-serif;font-weight:900;font-size:1.1rem;letter-spacing:.05em;line-height:1}
.logo-txt .w{color:#fff}
.logo-txt .o{background:linear-gradient(135deg,#ff9a3e,#ff5266);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

main{padding:100px 20px 60px;min-height:100vh;display:flex;align-items:center}
.form-container{background:rgba(255,255,255,.034);border:1px solid rgba(255,255,255,.07);border-radius:24px;padding:32px}

h1{font-family:'Inter Tight',sans-serif;font-size:28px;font-weight:900;margin-bottom:12px;text-align:center}
.subtitle{color:rgba(255,255,255,.65);font-size:14px;text-align:center;margin-bottom:30px}

.form-group{margin-bottom:20px}
label{display:block;font-size:13px;color:#79C9C5;margin-bottom:6px;font-weight:600}
input,select{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px 16px;color:#fff;font-size:14px;font-family:'Lato',sans-serif}
input::placeholder{color:rgba(255,255,255,.3)}
input:focus,select:focus{outline:none;border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.08)}

.btn{display:block;width:100%;background:linear-gradient(135deg,#ff9a3e,#ff5266);color:#fff;font-family:'Inter Tight',sans-serif;font-weight:700;padding:12px;border:none;border-radius:8px;cursor:pointer;font-size:15px;margin-top:24px;transition:opacity .3s}
.btn:hover{opacity:.88}

.note{text-align:center;color:rgba(255,255,255,.45);font-size:12px;margin-top:16px}

footer{background:#0a0120;padding:32px 20px;border-top:1px solid rgba(255,255,255,.05);text-align:center}
.footer-text{color:rgba(255,255,255,.45);font-size:12px}

@media(max-width:480px){
  .form-container{padding:24px}
  h1{font-size:24px}
}
</style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <div class="ni">
    <a href="index.html" class="logo-a">
      <svg width="32" height="24" viewBox="0 0 5 3" xmlns="http://www.w3.org/2000/svg">
        <rect width="5" height="1" fill="#000"/>
        <rect y="1" width="5" height="1" fill="#D00"/>
        <rect y="2" width="5" height="1" fill="#FFCE00"/>
      </svg>
      <div class="logo-txt" style="font-size:1.1rem"><span class="w">IPTV</span><span class="o" style="font-size:0.85em">KAUFEN</span></div>
    </a>
  </div>
</nav>

<!-- MAIN -->
<main>
  <div class="container">
    <div class="form-container">
      <h1>WhatsApp Kontakt</h1>
      <p class="subtitle">Wir kontaktieren Sie auf WhatsApp in 5 Minuten</p>
      
      <form id="contactForm">
        <div class="form-group">
          <label for="firstName">Vorname *</label>
          <input type="text" id="firstName" name="firstName" placeholder="Ihr Vorname" required/>
        </div>

        <div class="form-group">
          <label for="country">Land *</label>
          <select id="country" name="country" required>
            <option value="">Land wählen</option>
            <option value="Deutschland">Deutschland</option>
            <option value="Österreich">Österreich</option>
            <option value="Schweiz">Schweiz</option>
            <option value="Niederlande">Niederlande</option>
            <option value="Belgien">Belgien</option>
            <option value="Luxemburg">Luxemburg</option>
            <option value="Polen">Polen</option>
            <option value="Tschechien">Tschechien</option>
            <option value="Ungarn">Ungarn</option>
            <option value="Rumänien">Rumänien</option>
            <option value="Bulgarien">Bulgarien</option>
            <option value="Kroatien">Kroatien</option>
            <option value="Serbien">Serbien</option>
            <option value="Slovenien">Slovenien</option>
            <option value="Slowakei">Slowakei</option>
            <option value="Frankreich">Frankreich</option>
            <option value="Italien">Italien</option>
            <option value="Spanien">Spanien</option>
            <option value="Portugal">Portugal</option>
            <option value="Griechenland">Griechenland</option>
            <option value="Türkei">Türkei</option>
            <option value="Vereinigte Staaten">Vereinigte Staaten</option>
            <option value="Kanada">Kanada</option>
            <option value="Großbritannien">Großbritannien</option>
            <option value="Skandinavien">Skandinavien</option>
            <option value="Andere">Andere</option>
          </select>
        </div>

        <div class="form-group">
          <label for="whatsapp">WhatsApp Nummer *</label>
          <input type="tel" id="whatsapp" name="whatsapp" placeholder="+49 160 123456" required/>
          <small style="color:rgba(255,255,255,.35);font-size:11px;display:block;margin-top:4px">Bitte mit Ländervorwahl eingeben (z.B. +49)</small>
        </div>

        <button type="submit" class="btn">WhatsApp Kontakt →</button>
        <p class="note">Ihre Nummer wird nicht weitergegeben</p>
      </form>
    </div>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <div class="footer-text">
    <p>© 2026 IPTVV.DE – Alle Rechte vorbehalten</p>
  </div>
</footer>

<script>
document.getElementById('contactForm').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const firstName = document.getElementById('firstName').value;
  const country = document.getElementById('country').value;
  const whatsapp = document.getElementById('whatsapp').value;
  
  // Show success message (EmailJS integration will be added later)
  alert(`Danke ${firstName}! Wir kontaktieren Sie bald auf WhatsApp.\n\nDaten:\nLand: ${country}\nNummer: ${whatsapp}`);
  
  // Reset form
  this.reset();
  
  // Redirect to home after 2 seconds
  setTimeout(() => {
    window.location.href = '/index.html';
  }, 2000);
});
</script>

</body>
</html>
