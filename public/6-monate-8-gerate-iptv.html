<script>
(function(){
  var banner = document.getElementById('salesBanner');
  var closeBtn = document.getElementById('salesBannerClose');
  var titleEl = document.getElementById('salesBannerTitle');
  var textEl = document.getElementById('salesBannerText');
  if(!banner || !titleEl || !textEl) return;
  if(sessionStorage.getItem('m4kde_sales_banner_dismissed') === '1') return;

  var names = ["Alex", "Lukas", "Max", "Jonas", "Felix", "Niklas", "Tim", "Leon", "Julian", "Finn", "Sarah", "Lena", "Julia", "Laura", "Anna", "Nina", "Sophie", "Marie", "Lisa", "Katrin"];
  var cities = ["München", "Berlin", "Hamburg", "Köln", "Frankfurt", "Stuttgart", "Düsseldorf", "Leipzig", "Dortmund", "Essen", "Bremen", "Dresden", "Hannover", "Nürnberg", "Duisburg", "Bochum", "Wuppertal", "Mannheim", "Karlsruhe", "Münster"];
  var plans = ["1-Monats-Abo", "3-Monats-Abo", "3-Monats-Abo", "6-Monats-Abo", "6-Monats-Abo", "1-Jahres-Abo", "1-Jahres-Abo", "1-Jahres-Abo", "1-Jahres-Abo", "1-Jahres-Abo"];
  var timeAgo = ["gerade eben", "vor 2 Minuten", "vor 5 Minuten", "vor 9 Minuten"];

  function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

  var dismissed = false;
  var lastName = null;
  var timers = [];
  function setT(fn, ms){ var id = setTimeout(fn, ms); timers.push(id); return id; }

  function nextNotification(){
    var name = pick(names);
    while(name === lastName){ name = pick(names); }
    lastName = name;
    var city = pick(cities);
    var plan = pick(plans);
    titleEl.innerHTML = '<b>' + name + '</b> aus ' + city + ' hat ein ' + plan + ' gekauft';
    textEl.textContent = pick(timeAgo);
  }

  function cycle(){
    if(dismissed) return;
    nextNotification();
    banner.classList.add('show');
    setT(function(){
      if(dismissed) return;
      banner.classList.remove('show');
      setT(cycle, 3000);
    }, 5000);
  }

  setT(cycle, 2000 + Math.floor(Math.random() * 2000));

  if(closeBtn){
    closeBtn.addEventListener('click', function(){
      dismissed = true;
      banner.classList.remove('show');
      sessionStorage.setItem('m4kde_sales_banner_dismissed', '1');
      timers.forEach(clearTimeout);
    });
  }
})();
</script>
